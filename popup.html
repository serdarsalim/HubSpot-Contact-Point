<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HubSpot WhatsApp Contacts</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 420px;
        max-height: 560px;
        overflow: auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f9fc;
        color: #1f2d3d;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        color: #0b5cab;
      }

      .meta {
        margin: 0 0 10px;
        font-size: 12px;
        color: #52606d;
      }

      .status {
        font-size: 13px;
        padding: 8px;
        background: #e8eff7;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .item {
        background: #ffffff;
        border: 1px solid #dce5ee;
        border-radius: 10px;
        padding: 10px;
      }

      .name {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .email {
        font-size: 12px;
        color: #5b6b79;
        margin-bottom: 6px;
        word-break: break-all;
      }

      .phone {
        font-size: 13px;
      }

      .phone a {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 600;
      }

      .phone a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>HubSpot Contacts</h1>
    <p class="meta">Click a phone number to open WhatsApp.</p>
    <div id="status" class="status">Loading contacts...</div>
    <div id="list" class="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
