<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HubSpot WhatsApp Contacts</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 760px;
        max-height: 560px;
        overflow: auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f9fc;
        color: #1f2d3d;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        color: #0b5cab;
      }

      .meta {
        margin: 0 0 10px;
        font-size: 12px;
        color: #52606d;
      }

      .status {
        font-size: 13px;
        padding: 8px;
        background: #e8eff7;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .list {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        background: #ffffff;
        border: 1px solid #dce5ee;
        border-radius: 10px;
        overflow: hidden;
      }

      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #edf2f7;
        font-size: 13px;
        vertical-align: top;
      }

      th {
        background: #eef4fb;
        color: #24476d;
        font-weight: 700;
        position: sticky;
        top: 0;
      }

      th.sortable {
        cursor: pointer;
        user-select: none;
      }

      tr:last-child td {
        border-bottom: none;
      }

      td.name {
        font-weight: 600;
        width: 200px;
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.email {
        width: 220px;
        max-width: 220px;
        color: #4f6274;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: break-all;
      }

      td.phone {
        width: 180px;
        max-width: 180px;
        white-space: nowrap;
      }

      td.phone a {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 600;
      }

      td.phone a:hover {
        text-decoration: underline;
      }

      td.possibility {
        width: 110px;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #334e68;
      }
    </style>
  </head>
  <body>
    <h1>HubSpot Contacts</h1>
    <p class="meta">Click a phone number to open WhatsApp.</p>
    <div id="status" class="status">Loading contacts...</div>
    <div id="list" class="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
